<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>You, Always — For Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #050508;
    --deep: #0f0d18;
    --gold: #c9a84c;
    --gold-dim: #8a6f32;
    --silver: #b8b4c8;
    --fog: #6b667a;
    --cream: #f0ead8;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--ink);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor {
    position: fixed; width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 10000;
    transform: translate(-50%, -50%);
  }
  .particle {
    position: fixed; pointer-events: none;
    background: var(--gold); border-radius: 50%;
    z-index: 9999; opacity: 0.6;
  }

  /* ── CINEMATIC SPLASH ── */
  #splash {
    position: fixed; inset: 0; background: #000;
    z-index: 9999; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 2s ease, visibility 2s;
  }
  #splash h1 {
    font-family: 'Cinzel', serif; font-weight: 400;
    font-size: 3rem; letter-spacing: 1rem;
    color: var(--gold); opacity: 0;
    animation: splashFade 4s ease forwards;
  }
  #splash button {
    margin-top: 50px; background: none; border: 1px solid var(--gold-dim);
    color: var(--gold); padding: 12px 24px; font-family: 'Cinzel';
    cursor: none; letter-spacing: 3px; opacity: 0;
    animation: fadeIn 2s ease 3s forwards;
    transition: background 0.4s;
  }
  #splash button:hover { background: rgba(201,168,76,0.1); }

  @keyframes splashFade {
    0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
    50% { opacity: 1; transform: scale(1); filter: blur(0px); }
    100% { opacity: 0; transform: scale(1.1); filter: blur(5px); }
  }

  /* ── BACKGROUND ELEMENTS ── */
  #particles { position: fixed; inset: 0; z-index: 0; opacity: 0.4; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    opacity: 0; animation: shootingStar 4s linear infinite;
  }
  @keyframes shootingStar {
    0% { transform: translateX(0) translateY(0) rotate(-45deg) scale(0); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translateX(-1000px) translateY(1000px) rotate(-45deg) scale(1); opacity: 0; }
  }

  /* ── HERO & PARALLAX ── */
  section { position: relative; z-index: 1; min-height: 100vh; padding: 100px 20px; }
  #hero { overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .parallax-layer { position: absolute; width: 100%; text-align: center; pointer-events: none; }
  .hero-title {
    font-family: 'Cinzel', serif; font-size: clamp(40px, 10vw, 120px);
    letter-spacing: 0.2em; color: var(--cream);
  }
  .hero-title span { color: var(--gold); cursor: pointer; transition: 0.3s; }

  /* ── REASONS COUNTER ── */
  #reasons { background: var(--deep); text-align: center; }
  .counter-wrap { margin-top: 40px; }
  .count-number { font-family: 'Cinzel'; font-size: 80px; color: var(--gold); }
  .count-label { font-size: 20px; font-style: italic; color: var(--silver); }

  /* ── TIMELINE ── */
  .timeline-wrap { max-width: 800px; margin: 0 auto; position: relative; }
  .timeline-spine {
    position: absolute; left: 50%; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  }
  .tl-progress {
    position: absolute; left: 50%; top: 0; width: 3px; background: var(--gold);
    transform: translateX(-50%); height: 0%; transition: 0.1s linear;
  }
  .tl-item { width: 100%; margin-bottom: 100px; opacity: 0; transition: 1s; }
  .tl-item.visible { opacity: 1; transform: translateY(-20px); }

  /* ── MUSIC PLAYER ── */
  #music-control {
    position: fixed; bottom: 30px; right: 30px; z-index: 1000;
    display: flex; align-items: center; gap: 15px;
  }
  .music-btn {
    width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--gold);
    background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
  }
  .music-visualizer { display: flex; gap: 3px; align-items: flex-end; height: 15px; }
  .bar { width: 3px; background: var(--gold); height: 5px; }
  .playing .bar { animation: barGrow 1s infinite alternate; }
  @keyframes barGrow { to { height: 15px; } }

  /* ── CLOSING & NEXT CHAPTER ── */
  #next-chapter { background: radial-gradient(circle, #1a1728 0%, #050508 100%); text-align: center; }
  .infinity { font-size: 100px; color: var(--gold); margin-bottom: 20px; animation: glow 3s infinite alternate; }
  @keyframes glow { from { text-shadow: 0 0 10px var(--gold-dim); } to { text-shadow: 0 0 30px var(--gold); } }
</style>
</head>
<body>

<div id="splash">
    <h1 id="splash-name">MEGH</h1>
    <button id="start-btn">BEGIN THE JOURNEY</button>
</div>

<div id="cursor"></div>
<canvas id="particles"></canvas>

<div id="player-container" style="display:none">
    <iframe id="yt-player" width="0" height="0" 
        src="https://www.youtube.com/embed/uu7j_xljCRY?enablejsapi=1&loop=1&playlist=uu7j_xljCRY" 
        frameborder="0">
    </iframe>
</div>

<div id="music-control">
    <span style="font-family:'Cinzel'; font-size: 10px; color: var(--gold);">TAKE ME HOME</span>
    <button class="music-btn" id="toggle-music">
        <div class="music-visualizer" id="viz">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </button>
</div>

<section id="hero">
    <div class="parallax-layer" data-speed="0.2">
        <h1 class="hero-title">You, <span id="easter-egg">Always</span></h1>
        <p style="letter-spacing: 5px; margin-top: 20px; color: var(--silver);">From Rain, to Cloud</p>
    </div>
</section>

<section id="reasons">
    <div class="counter-wrap">
        <div class="count-number" id="love-counter">0</div>
        <div class="count-label">Reasons why my world is brighter with you</div>
    </div>
</section>

<section id="timeline">
    <div class="timeline-wrap">
        <div class="timeline-spine"></div>
        <div class="tl-progress" id="progress-bar"></div>
        
        <div class="tl-item" style="text-align: right; padding-right: 50%; padding-top: 50px;">
            <h3 style="color:var(--gold); font-family:'Cinzel';">THE FIRST HELLO</h3>
            <p style="font-style: italic; color:var(--fog);">The moment the sky cleared.</p>
        </div>
        
        <div class="tl-item" style="text-align: left; padding-left: 50%; margin-top: 100px;">
            <h3 style="color:var(--gold); font-family:'Cinzel';">ONE YEAR LATER</h3>
            <p style="font-style: italic; color:var(--fog);">Still finding new things to love.</p>
        </div>
    </div>
</section>

<section id="next-chapter">
    <div class="infinity">∞</div>
    <h2 style="font-family:'Cinzel'; letter-spacing: 8px;">THE NEXT CHAPTER</h2>
    <p style="margin-top: 20px; font-style: italic;">Here's to every year after this one.</p>
    <div id="live-timer" style="margin-top: 50px; font-family: 'Cinzel'; color: var(--gold-dim);"></div>
</section>

<script>
    // ── 1. SPLASH & MUSIC LOGIC ──
    const startBtn = document.getElementById('start-btn');
    const splash = document.getElementById('splash');
    const ytPlayer = document.getElementById('yt-player');
    let isPlaying = false;

    startBtn.addEventListener('click', () => {
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 2000);
        // Start Music via YouTube API PostMessage
        ytPlayer.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        document.getElementById('viz').classList.add('playing');
        isPlaying = true;
        startCounter();
    });

    document.getElementById('toggle-music').addEventListener('click', () => {
        if(isPlaying) {
            ytPlayer.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            document.getElementById('viz').classList.remove('playing');
        } else {
            ytPlayer.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            document.getElementById('viz').classList.add('playing');
        }
        isPlaying = !isPlaying;
    });

    // ── 2. CURSOR TRAIL ──
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        const size = Math.random() * 4 + 'px';
        p.style.width = size; p.style.height = size;
        document.body.appendChild(p);
        
        setTimeout(() => {
            p.style.transform = `translate(${(Math.random()-0.5)*50}px, ${Math.random()*50}px)`;
            p.style.opacity = '0';
        }, 10);
        setTimeout(() => p.remove(), 1000);
    });

    // ── 3. REASONS COUNTER ──
    function startCounter() {
        let count = 0;
        const target = 365;
        const el = document.getElementById('love-counter');
        const interval = setInterval(() => {
            if(count < target) {
                count++;
                el.innerText = count;
            } else {
                clearInterval(interval);
            }
        }, 15);
    }

    // ── 4. PARALLAX & SCROLL ──
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        document.querySelectorAll('.parallax-layer').forEach(layer => {
            const speed = layer.getAttribute('data-speed');
            layer.style.transform = `translateY(${scrolled * speed}px)`;
        });

        // Timeline Progress Bar
        const timeline = document.getElementById('timeline');
        const progress = document.getElementById('progress-bar');
        const rect = timeline.getBoundingClientRect();
        const viewHeight = window.innerHeight;
        if(rect.top < viewHeight) {
            let percent = (Math.abs(rect.top) / rect.height) * 100;
            progress.style.height = Math.min(percent + 20, 100) + '%';
        }

        // Fade in items
        document.querySelectorAll('.tl-item').forEach(item => {
            if(item.getBoundingClientRect().top < viewHeight * 0.8) {
                item.classList.add('visible');
            }
        });
    });

    // ── 5. EASTER EGG ──
    let clicks = 0;
    document.getElementById('easter-egg').addEventListener('click', () => {
        clicks++;
        if(clicks === 3) {
            for(let i=0; i<50; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤';
                heart.style.position = 'fixed';
                heart.style.left = '50%'; heart.style.top = '50%';
                heart.style.color = 'var(--gold)';
                heart.style.zIndex = '10001';
                heart.style.transition = '2s';
                document.body.appendChild(heart);
                setTimeout(() => {
                    heart.style.transform = `translate(${(Math.random()-0.5)*1000}px, ${(Math.random()-0.5)*1000}px) scale(${Math.random()*3})`;
                    heart.style.opacity = '0';
                }, 10);
                setTimeout(() => heart.remove(), 2000);
            }
            clicks = 0;
        }
    });

    // ── 6. SHOOTING STARS ──
    setInterval(() => {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = '2px'; star.style.height = '100px';
        star.style.top = Math.random() * 50 + '%';
        star.style.left = Math.random() * 100 + '%';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 4000);
    }, 3000);

    // ── 7. LIVE TIMER (Days Together) ──
    const startDate = new Date('March 24, 2024'); // Adjust your anniversary date here
    setInterval(() => {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / 1000 / 60) % 60);
        const secs = Math.floor((diff / 1000) % 60);
        document.getElementById('live-timer').innerText = `${days} Days · ${hours}h · ${mins}m · ${secs}s`;
    }, 1000);

    // ── 8. PARTICLES CANVAS ──
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let parts = [];
    for(let i=0; i<100; i++) parts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(201,168,76,0.3)";
        parts.forEach(p => {
            p.y -= p.s * 0.5;
            if(p.y < 0) p.y = canvas.height;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();
</script>

</body>
</html>
